<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNP — Ishlab Chiqarish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo-wrap"><span class="login-logo">RNP</span></div>
      <h2 class="login-title">Xush kelibsiz</h2>
      <p class="login-sub">Ishlab chiqarish boshqaruv paneli</p>
    </div>
    <div class="login-body">
      <div class="form-group">
        <label for="loginEmail">Email manzil</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M2.5 6.667l7.5 5 7.5-5M2.5 5h15a.833.833 0 01.833.833v8.334A.833.833 0 0117.5 15h-15a.833.833 0 01-.833-.833V5.833A.833.833 0 012.5 5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input type="email" id="loginEmail" placeholder="admin@rnp.uz" value="admin@rnp.uz" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Parol</label>
        <div class="input-wrap" style="position:relative">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="3.333" y="9.167" width="13.333" height="9.167" rx="1.667" stroke="currentColor" stroke-width="1.5"/><path d="M6.667 9.167V6.667a3.333 3.333 0 016.667 0v2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="new-password">
          <button type="button" id="togglePass" onclick="var i=document.getElementById('loginPassword');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:0;line-height:1">👁</button>
        </div>
      </div>
      <div id="loginError" class="error-msg"></div>
      <button id="loginBtn" class="btn-primary">Kirish</button>
      <div class="login-switch">
        Akkaunt yo'qmi? <a href="#" id="switchToRegister">Ro'yxatdan o'tish</a>
      </div>
    </div>

    <!-- REGISTER FORM (hidden by default) -->
    <div class="login-body" id="registerForm" style="display:none">
      <div class="form-group">
        <label for="regEmail">Email manzil</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M2.5 6.667l7.5 5 7.5-5M2.5 5h15a.833.833 0 01.833.833v8.334A.833.833 0 0117.5 15h-15a.833.833 0 01-.833-.833V5.833A.833.833 0 012.5 5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input type="email" id="regEmail" placeholder="admin@rnp.uz" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label for="regPassword">Parol (kamida 6 ta belgi)</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="3.333" y="9.167" width="13.333" height="9.167" rx="1.667" stroke="currentColor" stroke-width="1.5"/><path d="M6.667 9.167V6.667a3.333 3.333 0 016.667 0v2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
        </div>
      </div>
      <div id="registerError" class="error-msg"></div>
      <div id="registerSuccess" class="success-msg"></div>
      <button id="registerBtn" class="btn-primary">Ro'yxatdan o'tish</button>
      <div class="login-switch">
        Akkaunt bormi? <a href="#" id="switchToLogin">Kirish</a>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app" class="app hidden">

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="brand-dot"></span>
        <span class="brand-name">RNP</span>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Yopish">
        <svg viewBox="0 0 20 20" fill="none"><path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar-section-label">Asosiy</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <span class="nav-icon-wrap">
          <svg viewBox="0 0 20 20" fill="none"><rect x="2.5" y="2.5" width="6.667" height="6.667" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10.833" y="2.5" width="6.667" height="6.667" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="2.5" y="10.833" width="6.667" height="6.667" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10.833" y="10.833" width="6.667" height="6.667" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </span>
        <span class="nav-text">Ishlab chiqarish</span>
      </a>
    </nav>

    <div class="sidebar-section-label">Hisobotlar</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item">
        <span class="nav-icon-wrap">
          <svg viewBox="0 0 20 20" fill="none"><path d="M2.5 15l5-5 3.333 3.333L15 7.5l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 17.5h15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <span class="nav-text">Tahlil</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7.5" r="3.333" stroke="currentColor" stroke-width="1.5"/><path d="M3.333 17.5c0-3.682 2.985-6.667 6.667-6.667s6.667 2.985 6.667 6.667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <span id="userDisplay" class="user-email"></span>
      </div>
      <button id="logoutBtn" class="btn-logout">
        <svg viewBox="0 0 20 20" fill="none"><path d="M7.5 17.5H4.167A1.667 1.667 0 012.5 15.833V4.167A1.667 1.667 0 014.167 2.5H7.5M13.333 14.167L17.5 10l-4.167-4.167M17.5 10H7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Chiqish</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Menyu">
        <svg viewBox="0 0 20 20" fill="none"><path d="M2.5 5h15M2.5 10h15M2.5 15h15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-left">
        <h1 class="page-title">Ishlab chiqarish</h1>
        <div class="breadcrumb">
          <span>RNP</span>
          <svg viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="breadcrumb-active">Ishlab chiqarish</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="9.167" cy="9.167" r="5.833" stroke="currentColor" stroke-width="1.5"/><path d="M17.5 17.5l-3.75-3.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="searchInput" placeholder="Qidirish..." class="search-input" autocomplete="off">
        </div>
        <div class="date-wrap">
          <svg class="date-icon" viewBox="0 0 20 20" fill="none"><rect x="2.5" y="3.333" width="15" height="14.167" rx="1.667" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 7.5h15M6.667 2.5v1.667M13.333 2.5v1.667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="date" id="dateInput" class="date-input">
        </div>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="content-area">

      <!-- PARAM LIST -->
      <div class="params-panel">
        <div class="params-panel-header">
          <span class="params-panel-title">Ko'rsatkichlar</span>
          <span class="params-count" id="paramsCount"></span>
        </div>
        <div id="paramsList" class="params-list"></div>
      </div>

      <!-- INPUT PANEL -->
      <div class="input-panel" id="inputPanel">
        <div class="input-panel-inner">

          <div class="entry-card">
            <div class="entry-section-chip" id="inputSectionLabel">—</div>
            <div class="entry-param-name" id="activeParamName">Ko'rsatkichni tanlang</div>
            <label class="entry-input-label">Qiymat</label>
            <div class="entry-input-row">
              <input type="number" id="valueInput" class="value-input" placeholder="0" step="any" autocomplete="off">
              <div class="unit-chip" id="unitLabel">—</div>
            </div>
            <p class="entry-key-hint">↵ Enter — tez saqlash</p>
            <button id="saveBtn" class="btn-save">✓ Saqlash</button>
          </div>

          <div class="today-section">
            <div class="today-section-header">
              <span class="today-section-title">Bugun kiritilganlar</span>
              <span class="today-badge" id="todayCountBadge"></span>
            </div>
            <div id="todayList" class="today-list">
              <span class="empty-hint">Hali kiritilmagan</span>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
